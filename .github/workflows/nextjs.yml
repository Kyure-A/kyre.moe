# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages
on:
  pull_request:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
permissions:
  contents: read
# Cancel redundant PR builds, but keep branch-specific deploys serialized.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Setup Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "store-path=$(pnpm store path)" >> $GITHUB_OUTPUT
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Restore next.js cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Format check (treefmt)
        run: nix shell nixpkgs#treefmt nixpkgs#biome --command treefmt --ci
      - name: Lint
        run: pnpm lint
      - name: Install Emacs for Org export
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
      - name: Export Org to Markdown
        run: pnpm content:org
      - name: Copy blog images to public
        run: pnpm content:images
      - name: Convert hero image to WebP
        run: |
          sudo apt-get update
          sudo apt-get install -y webp
          cwebp -q 100 -alpha_q 100 public/kyure_a.png -o public/kyure_a.webp
          cwebp -q 100 -alpha_q 100 -resize 0 640 public/kyure_a.png -o public/kyure_a-640.webp
          cwebp -q 100 -alpha_q 100 -resize 1000 0 public/kyure_a.png -o public/kyure_a-1000.webp
          cwebp -q 100 -alpha_q 100 -resize 1600 0 public/kyure_a.png -o public/kyure_a-1600.webp
      - name: Download Noto Sans JP for OGP
        id: og-font
        run: |
          set -euo pipefail
          mkdir -p public/fonts

          FONT_PATH="public/fonts/NotoSansCJKjp-Regular.otf"
          curl -fL --retry 3 --retry-delay 2 \
            -o "$FONT_PATH" \
            "https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf"
          echo "path=$FONT_PATH" >> "$GITHUB_OUTPUT"
      - name: Build with Next.js
        env:
          CI: false
          ESLINT_NO_DEV_ERRORS: true
          OG_IMAGE_FONT_PATH: ${{ steps.og-font.outputs.path }}
        run: pnpm next build --no-lint
      - name: Rewrite OGP image URLs for static hosting
        run: pnpm fix:ogp-export
      - name: Upload artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out
  # Deployment job
  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
