# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages
on:
  pull_request:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
permissions:
  contents: read
# Cancel redundant PR builds, but keep branch-specific deploys serialized.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20"
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "store-path=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      - name: Setup pnpm cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Restore next.js cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format check (treefmt)
        run: nix shell nixpkgs#treefmt nixpkgs#biome --command treefmt --ci
      - name: Lint
        run: pnpm lint
      - name: Setup Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          static_site_generator: next
      - name: Prepare article content
        run: pnpm content
      - name: Convert hero image to WebP
        run: |
          sudo apt-get update
          sudo apt-get install -y webp
          cwebp -q 100 -alpha_q 100 public/kyure_a.png -o public/kyure_a.webp
          cwebp -q 100 -alpha_q 100 -resize 0 640 public/kyure_a.png -o public/kyure_a-640.webp
          cwebp -q 100 -alpha_q 100 -resize 1000 0 public/kyure_a.png -o public/kyure_a-1000.webp
          cwebp -q 100 -alpha_q 100 -resize 1600 0 public/kyure_a.png -o public/kyure_a-1600.webp
      - name: Download Noto Sans JP for OGP
        id: og-font
        run: |
          set -euo pipefail
          mkdir -p public/fonts

          FONT_PATH="public/fonts/NotoSansCJKjp-Regular.otf"
          curl -fL --retry 3 --retry-delay 2 \
            -o "$FONT_PATH" \
            "https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf"
          echo "path=$FONT_PATH" >> "$GITHUB_OUTPUT"
      - name: Build with Next.js
        env:
          CI: false
          OG_IMAGE_FONT_PATH: ${{ steps.og-font.outputs.path }}
        run: pnpm next build
      - name: Rewrite OGP image URLs for static hosting
        run: pnpm fix:ogp-export
      - name: Upload artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./out
  # Deployment job
  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
